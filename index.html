<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokémon API Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e3350d;
            --dark: #1a1a2e;
            --card: #16213e;
            --border: #0f3460;
            --green: #00e676;
            --muted: #8892b0;
            --text: #ccd6f6;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 36px 16px;
        }

        .container {
            width: 100%;
            max-width: 640px;
        }

        /* Header */
        header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .pokeball {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(180deg, var(--red) 50%, #fff 50%);
            border: 3px solid #fff;
            position: relative;
            flex-shrink: 0;
            box-shadow: 0 0 14px rgba(227,53,13,0.4);
            animation: spin 6s linear infinite;
        }
        .pokeball::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            width: 10px; height: 10px;
            background: #fff;
            border-radius: 50%;
            border: 2.5px solid #333;
        }
        @keyframes spin {
            0%,100% { transform: rotate(0deg); }
            25% { transform: rotate(15deg); }
            75% { transform: rotate(-15deg); }
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #fff;
        }
        h1 span { color: var(--red); }

        /* Docs */
        .docs {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 20px;
            margin-bottom: 20px;
            font-size: 0.82rem;
        }
        .docs h2 {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 10px;
        }
        .docs ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        .docs li { display: flex; align-items: flex-start; gap: 8px; }
        .method {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            background: rgba(0,230,118,0.12);
            color: var(--green);
            border-radius: 4px;
            padding: 1px 6px;
            margin-top: 1px;
            flex-shrink: 0;
        }
        .docs code {
            font-family: 'Space Mono', monospace;
            color: #a8daff;
            font-size: 0.78rem;
        }
        .docs .desc { color: var(--muted); }

        /* Search */
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.78rem;
            padding: 10px 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: var(--red); }
        input[type="text"]::placeholder { color: var(--muted); }

        button {
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-family: 'Nunito', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            padding: 10px 20px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            white-space: nowrap;
        }
        button:hover { opacity: 0.88; }
        button:active { transform: scale(0.97); }

        /* Output */
        .output-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .output-wrap {
            background: #0d0d1a;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .output-bar {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 7px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .dot { width: 9px; height: 9px; border-radius: 50%; }
        .dot-r { background: #e3350d; }
        .dot-y { background: #f5c518; }
        .dot-g { background: #00e676; }

        pre {
            font-family: 'Space Mono', monospace;
            font-size: 0.76rem;
            line-height: 1.65;
            color: var(--green);
            padding: 16px;
            overflow-x: auto;
            max-height: 360px;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div class="pokeball"></div>
        <h1><span>Pokémon</span> API Explorer</h1>
    </header>

    <div class="docs">
        <h2>Endpoints</h2>
        <ul>
            <li>
                <span class="method">GET</span>
                <div><code>/api/pokemon</code><br><span class="desc">All Pokémon</span></div>
            </li>
            <li>
                <span class="method">GET</span>
                <div><code>/api/pokemon?name=bulbasaur</code><br><span class="desc">Search by name (partial match)</span></div>
            </li>
            <li>
                <span class="method">GET</span>
                <div><code>/api/pokemon?legendary=true</code><br><span class="desc">Filter by legendary status</span></div>
            </li>
        </ul>
    </div>

    <div class="search-row">
        <input type="text" id="endpoint" placeholder="Enter API endpoint…" value="api/pokemon">
        <button onclick="fetchAPI()">Fetch</button>
    </div>

    <div class="output-label">Response</div>
    <div class="output-wrap">
        <div class="output-bar">
            <div class="dot dot-r"></div>
            <div class="dot dot-y"></div>
            <div class="dot dot-g"></div>
        </div>
        <pre id="result">// Hit Fetch to see results</pre>
    </div>

</div>
<script>
    async function fetchAPI() {
        const endpoint = document.getElementById('endpoint').value.trim();
        const pre = document.getElementById('result');
        pre.textContent = '// Loading…';
        try {
            const res = await fetch(endpoint);
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            pre.textContent = JSON.stringify(data, null, 2);
        } catch (e) {
            pre.textContent = '// Error: ' + e.message;
        }
    }
</script>
</body>
</html>
